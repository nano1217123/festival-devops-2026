name: Verificacion Proyecto

on:
  push:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar index.html
        run: test -f frontend/index.html

      - name: Verificar style.css
        run: test -f frontend/style.css

      - name: Verificar app.py
        run: test -f backend/app.py

      - name: Verificar README
        run: test -f README.md

      - name: Validacion completada
        run: echo "Proyecto validado correctamente"